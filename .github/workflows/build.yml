name: Build IPA
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install xcodegen
        run: brew install xcodegen
        
      - name: Create Project Files
        run: |
          mkdir -p iAudioApp
          
          cat << 'EOF' > project.yml
          name: iAudioApp
          options:
            bundleIdPrefix: com.iaudio
          targets:
            iAudioApp:
              type: application
              platform: iOS
              deploymentTarget: "14.0"
              sources: [iAudioApp]
              info:
                path: iAudioApp/Info.plist
          EOF
          
          cat << 'EOF' > iAudioApp/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>NSMicrophoneUsageDescription</key>
            <string>Нужен микрофон для передачи аудио на ПК</string>
            <key>NSLocalNetworkUsageDescription</key>
            <string>Нужен доступ к сети для Wi-Fi режима</string>
            <key>UIBackgroundModes</key>
            <array>
              <string>audio</string>
            </array>
          </dict>
          </plist>
          EOF
          
          cat << 'EOF' > iAudioApp/iAudioAppApp.swift
          import SwiftUI
          @main
          struct iAudioAppApp: App {
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                  }
              }
          }
          EOF
          
          cat << 'EOF' > iAudioApp/ContentView.swift
          import SwiftUI
          import AVFoundation
          import Network

          class StreamSettings: ObservableObject {
              @AppStorage("ipAddress") var ipAddress: String = "192.168.137.1"
              @AppStorage("port") var port: String = "12345"
              @AppStorage("mode") var mode: String = "Wi-Fi" // "Wi-Fi" или "USB"
          }

          class AudioStreamer: ObservableObject {
              @Published var isStreaming = false
              @Published var usbConnected = false
              
              private var audioEngine = AVAudioEngine()
              private var connection: NWConnection?
              private var listener: NWListener?
              
              func start(settings: StreamSettings) {
                  let portNum = NWEndpoint.Port(settings.port) ?? 12345
                  
                  if settings.mode == "Wi-Fi" {
                      // Wi-Fi UDP Mode (Старая добрая схема)
                      let host = NWEndpoint.Host(settings.ipAddress)
                      connection = NWConnection(host: host, port: portNum, using: .udp)
                      connection?.start(queue: .global())
                  } else {
                      // USB TCP Mode (Для usbmuxd)
                      let tcpOptions = NWProtocolTCP.Options()
                      tcpOptions.noDelay = true // Убираем задержки TCP пакетов
                      let params = NWParameters(tls: nil, tcp: tcpOptions)
                      
                      do {
                          listener = try NWListener(using: params, on: portNum)
                          listener?.newConnectionHandler = { newConn in
                              self.connection = newConn
                              newConn.stateUpdateHandler = { state in
                                  DispatchQueue.main.async { self.usbConnected = (state == .ready) }
                              }
                              newConn.start(queue: .global())
                          }
                          listener?.start(queue: .global())
                      } catch { print(error) }
                  }
                  
                  // ЯДЕРНАЯ ЛОГИКА ЗАХВАТА ЗВУКА (БЕЗ ИЗМЕНЕНИЙ)
                  let audioSession = AVAudioSession.sharedInstance()
                  try? audioSession.setCategory(.record, mode: .measurement, options: [.allowBluetooth])
                  try? audioSession.setPreferredSampleRate(48000)
                  try? audioSession.setActive(true)
                  
                  let inputNode = audioEngine.inputNode
                  // Тот самый формат из рабочего билда
                  let format = AVAudioFormat(commonFormat: .pcmFormatInt16, sampleRate: 48000, channels: 1, interleaved: true)!
                  
                  inputNode.installTap(onBus: 0, bufferSize: 960, format: format) { (buffer, time) in
                      guard let channelData = buffer.int16ChannelData else { return }
                      let frameLength = Int(buffer.frameLength)
                      // Прямое копирование байтов как в старой версии
                      let data = Data(bytes: channelData[0], count: frameLength * 2)
                      
                      self.connection?.send(content: data, completion: .contentProcessed({ _ in }))
                  }
                  
                  try? audioEngine.start()
                  isStreaming = true
              }
              
              func stop() {
                  audioEngine.stop()
                  audioEngine.inputNode.removeTap(onBus: 0)
                  connection?.cancel()
                  listener?.cancel()
                  isStreaming = false
                  usbConnected = false
              }
          }

          struct MainView: View {
              @ObservedObject var streamer: AudioStreamer
              @ObservedObject var settings: StreamSettings
              
              var body: some View {
                  VStack(spacing: 40) {
                      Text("iAudio Mic").font(.largeTitle).bold()
                      
                      ZStack {
                          Circle()
                              .fill(streamer.isStreaming ? (settings.mode == "USB" && !streamer.usbConnected ? Color.orange : Color.green) : Color.red)
                              .frame(width: 200, height: 200)
                              .shadow(radius: 10)
                          
                          Button(action: {
                              streamer.isStreaming ? streamer.stop() : streamer.start(settings: settings)
                          }) {
                              Image(systemName: streamer.isStreaming ? "stop.fill" : "play.fill")
                                  .font(.system(size: 60))
                                  .foregroundColor(.white)
                          }
                      }
                      
                      VStack(spacing: 10) {
                          Text(streamer.isStreaming ? "В ЭФИРЕ" : "ОСТАНОВЛЕНО")
                              .font(.title2).bold()
                          
                          if settings.mode == "USB" && streamer.isStreaming {
                              Text(streamer.usbConnected ? "USB ПОДКЛЮЧЕНО" : "ОЖИДАНИЕ КАБЕЛЯ...")
                                  .foregroundColor(streamer.usbConnected ? .green : .orange)
                          } else if streamer.isStreaming {
                              Text("Цель: \(settings.ipAddress):\(settings.port)")
                                  .foregroundColor(.secondary)
                          }
                      }
                  }
              }
          }

          struct SettingsView: View {
              @ObservedObject var settings: StreamSettings
              
              var body: some View {
                  NavigationView {
                      Form {
                          Section(header: Text("Тип соединения")) {
                              Picker("Режим", selection: $settings.mode) {
                                  Text("Wi-Fi (UDP)").tag("Wi-Fi")
                                  Text("USB (TCP)").tag("USB")
                              }.pickerStyle(SegmentedPickerStyle())
                          }
                          
                          if settings.mode == "Wi-Fi" {
                              Section(header: Text("Сетевой адрес")) {
                                  TextField("IP Address", text: $settings.ipAddress)
                                      .keyboardType(.numbersAndPunctuation)
                              }
                          }
                          
                          Section(header: Text("Порт")) {
                              TextField("Порт", text: $settings.port)
                                  .keyboardType(.numberPad)
                          }
                      }
                      .navigationTitle("Настройки")
                  }
              }
          }

          struct ContentView: View {
              @StateObject var streamer = AudioStreamer()
              @StateObject var settings = StreamSettings()
              
              var body: some View {
                  TabView {
                      MainView(streamer: streamer, settings: settings)
                          .tabItem { Label("Эфир", systemImage: "mic.fill") }
                      
                      SettingsView(settings: settings)
                          .tabItem { Label("Настройки", systemImage: "gearshape.fill") }
                  }
              }
          }
          EOF
          
      - name: Generate Xcode project
        run: xcodegen generate
        
      - name: Build Payload
        run: |
          xcodebuild build -project iAudioApp.xcodeproj -scheme iAudioApp -configuration Release -arch arm64 -sdk iphoneos CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO CONFIGURATION_BUILD_DIR=build/Release-iphoneos
          mkdir -p Payload
          mv build/Release-iphoneos/iAudioApp.app Payload/
          zip -r iAudioApp.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iAudioApp-IPA
          path: iAudioApp.ipa

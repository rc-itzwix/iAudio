name: Build IPA
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install xcodegen
        run: brew install xcodegen
        
      - name: Create Project Files
        run: |
          mkdir -p iAudioApp
          
          cat << 'EOF' > project.yml
          name: iAudioApp
          options:
            bundleIdPrefix: com.iaudio
          targets:
            iAudioApp:
              type: application
              platform: iOS
              deploymentTarget: "14.0"
              sources: [iAudioApp]
              info:
                path: iAudioApp/Info.plist
          EOF
          
          cat << 'EOF' > iAudioApp/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>NSMicrophoneUsageDescription</key>
            <string>Нужен микрофон для передачи аудио на ПК</string>
            <key>NSLocalNetworkUsageDescription</key>
            <string>Нужен доступ к локальной сети для передачи аудио</string>
          </dict>
          </plist>
          EOF
          
          cat << 'EOF' > iAudioApp/iAudioAppApp.swift
          import SwiftUI

          @main
          struct iAudioAppApp: App {
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                  }
              }
          }
          EOF
          
          cat << 'EOF' > iAudioApp/ContentView.swift
          import SwiftUI
          import AVFoundation
          import Network

          class StreamSettings: ObservableObject {
              @AppStorage("ipAddress") var ipAddress: String = "192.168.1.100"
              @AppStorage("port") var port: String = "12345"
              @AppStorage("sampleRate") var sampleRate: Double = 48000.0
              @AppStorage("channels") var channels: Int = 1
              @AppStorage("bitDepth") var bitDepth: String = "Int16"
              @Published var selectedMicID: String? = nil
          }

          class AudioStreamer: ObservableObject {
              @Published var isStreaming = false
              private var audioEngine = AVAudioEngine()
              private var connection: NWConnection?
              private let settings = StreamSettings()
              
              func start(config: StreamSettings) {
                  let host = NWEndpoint.Host(config.ipAddress)
                  let port = NWEndpoint.Port(config.port) ?? 12345
                  connection = NWConnection(host: host, port: port, using: .udp)
                  connection?.start(queue: .global())
                  
                  let session = AVAudioSession.sharedInstance()
                  do {
                      try session.setCategory(.playAndRecord, mode: .measurement, options: [.allowBluetooth, .defaultToSpeaker])
                      if let micID = config.selectedMicID,
                         let inputs = session.availableInputs,
                         let targetInput = inputs.first(where: { $0.uid == micID }) {
                          try session.setPreferredInput(targetInput)
                      }
                      try session.setPreferredSampleRate(config.sampleRate)
                      try session.setActive(true)
                  } catch {}
                  
                  let inputNode = audioEngine.inputNode
                  let inputFormat = inputNode.inputFormat(onBus: 0)
                  let outputFormat = AVAudioFormat(
                      commonFormat: config.bitDepth == "Int16" ? .pcmFormatInt16 : .pcmFormatFloat32,
                      sampleRate: config.sampleRate,
                      channels: AVAudioChannelCount(config.channels),
                      interleaved: true
                  )!
                  let converter = AVAudioConverter(from: inputFormat, to: outputFormat)
                  
                  inputNode.installTap(onBus: 0, bufferSize: 1024, format: inputFormat) { buffer, time in
                      let frameCount = AVAudioFrameCount(outputFormat.sampleRate / 100)
                      guard let outBuffer = AVAudioPCMBuffer(pcmFormat: outputFormat, frameCapacity: frameCount) else { return }
                      var error: NSError?
                      converter?.convert(to: outBuffer, error: &error) { inNumPackets, outStatus in
                          outStatus.pointee = .haveData
                          return buffer
                      }
                      if let data = self.toData(buffer: outBuffer) {
                          self.connection?.send(content: data, completion: .contentProcessed({ _ in }))
                      }
                  }
                  do {
                      try audioEngine.start()
                      isStreaming = true
                  } catch {}
              }
              
              func stop() {
                  audioEngine.stop()
                  audioEngine.inputNode.removeTap(onBus: 0)
                  connection?.cancel()
                  isStreaming = false
              }
              
              private func toData(buffer: AVAudioPCMBuffer) -> Data? {
                  let frameLength = Int(buffer.frameLength)
                  if buffer.format.commonFormat == .pcmFormatInt16 {
                      guard let channelData = buffer.int16ChannelData else { return nil }
                      return Data(bytes: channelData[0], count: frameLength * MemoryLayout<Int16>.size)
                  } else {
                      guard let channelData = buffer.floatChannelData else { return nil }
                      return Data(bytes: channelData[0], count: frameLength * MemoryLayout<Float>.size)
                  }
              }
          }

          struct WaveView: View {
              @State private var wave = false
              var body: some View {
                  ZStack {
                      ForEach(0..<3) { i in
                          Circle()
                              .stroke(Color.blue.opacity(0.5))
                              .frame(width: 100, height: 100)
                              .scaleEffect(wave ? 3 : 1)
                              .opacity(wave ? 0 : 1)
                              .animation(Animation.easeInOut(duration: 1.5).repeatForever(autoreverses: false).delay(Double(i) * 0.5), value: wave)
                      }
                  }
                  .onAppear { wave = true }
              }
          }

          struct MainView: View {
              @ObservedObject var streamer: AudioStreamer
              @ObservedObject var settings: StreamSettings
              var body: some View {
                  VStack {
                      Spacer()
                      ZStack {
                          if streamer.isStreaming { WaveView() }
                          Button(action: { streamer.isStreaming ? streamer.stop() : streamer.start(config: settings) }) {
                              Image(systemName: streamer.isStreaming ? "mic.fill" : "mic.slash.fill")
                                  .font(.system(size: 80))
                                  .foregroundColor(.white)
                                  .frame(width: 150, height: 150)
                                  .background(streamer.isStreaming ? Color.blue : Color.gray)
                                  .clipShape(Circle())
                                  .shadow(radius: 10)
                          }
                      }
                      Text(streamer.isStreaming ? "В ЭФИРЕ" : "ГОТОВ К ПЕРЕДАЧЕ")
                          .font(.headline).padding(.top, 40)
                          .foregroundColor(streamer.isStreaming ? .blue : .gray)
                      Text("\(settings.ipAddress):\(settings.port)")
                          .font(.caption).foregroundColor(.secondary)
                      Spacer()
                  }
              }
          }

          struct SettingsView: View {
              @ObservedObject var settings: StreamSettings
              @State private var availableMics: [AVAudioSessionPortDescription] = []
              let rates = [16000.0, 32000.0, 44100.0, 48000.0, 96000.0]
              let bitDepths = ["Int16", "Float32"]
              
              var body: some View {
                  NavigationView {
                      Form {
                          Section(header: Text("Сетевой адрес")) {
                              TextField("IP Address", text: $settings.ipAddress).keyboardType(.numbersAndPunctuation)
                              TextField("Port", text: $settings.port).keyboardType(.numberPad)
                          }
                          Section(header: Text("Выбор микрофона")) {
                              Picker("Устройство", selection: $settings.selectedMicID) {
                                  Text("Системный (По умолчанию)").tag(nil as String?)
                                  ForEach(availableMics, id: \.uid) { mic in
                                      Text(mic.portName).tag(mic.uid as String?)
                                  }
                              }
                          }
                          Section(header: Text("Параметры аудио")) {
                              Picker("Частота (кГц)", selection: $settings.sampleRate) {
                                  ForEach(rates, id: \.self) { rate in Text("\(Int(rate/1000)) kHz").tag(rate) }
                              }
                              Picker("Каналы", selection: $settings.channels) {
                                  Text("Моно").tag(1)
                                  Text("Стерео").tag(2)
                              }
                              Picker("Разрядность", selection: $settings.bitDepth) {
                                  ForEach(bitDepths, id: \.self) { depth in Text(depth).tag(depth) }
                              }
                          }
                          Section(footer: Text("Используйте 48kHz / Int16 для минимальной задержки.")) {
                              Button("Обновить список устройств") { refreshDevices() }
                          }
                      }
                      .navigationTitle("Настройки")
                      .onAppear { refreshDevices() }
                  }
              }
              func refreshDevices() { availableMics = AVAudioSession.sharedInstance().availableInputs ?? [] }
          }

          struct ContentView: View {
              @StateObject var streamer = AudioStreamer()
              @StateObject var settings = StreamSettings()
              var body: some View {
                  TabView {
                      MainView(streamer: streamer, settings: settings).tabItem { Label("Микрофон", systemImage: "mic") }
                      SettingsView(settings: settings).tabItem { Label("Настройки", systemImage: "gearshape") }
                  }
                  .onAppear { AVAudioSession.sharedInstance().requestRecordPermission { _ in } }
              }
          }
          EOF
          
      - name: Generate Xcode project
        run: xcodegen generate
        
      - name: Build Payload
        run: |
          xcodebuild build -project iAudioApp.xcodeproj -scheme iAudioApp -configuration Release -arch arm64 -sdk iphoneos CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO CONFIGURATION_BUILD_DIR=build/Release-iphoneos
          mkdir -p Payload
          mv build/Release-iphoneos/iAudioApp.app Payload/
          zip -r iAudioApp.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iAudioApp-IPA
          path: iAudioApp.ipa

name: Build IPA
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install xcodegen
        run: brew install xcodegen
        
      - name: Create Project Files
        run: |
          mkdir -p iAudioApp
          
          cat << 'EOF' > project.yml
          name: iAudioApp
          options:
            bundleIdPrefix: com.iaudio
          targets:
            iAudioApp:
              type: application
              platform: iOS
              deploymentTarget: "14.0"
              sources: [iAudioApp]
              info:
                path: iAudioApp/Info.plist
          EOF
          
          cat << 'EOF' > iAudioApp/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>NSMicrophoneUsageDescription</key>
            <string>Нужен микрофон для передачи аудио на ПК</string>
          </dict>
          </plist>
          EOF
          
          cat << 'EOF' > iAudioApp/iAudioAppApp.swift
          import SwiftUI

          @main
          struct iAudioAppApp: App {
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                  }
              }
          }
          EOF
          
          cat << 'EOF' > iAudioApp/ContentView.swift
          import SwiftUI
          import AVFoundation
          import Network

          struct ContentView: View {
              @State private var isStreaming = false
              @State private var ipAddress = "192.168.137.1"
              @State private var port = "12345"
              @State private var audioEngine = AVAudioEngine()
              @State private var connection: NWConnection?
              
              var body: some View {
                  VStack(spacing: 30) {
                      Text("iAudio Mic").font(.largeTitle).bold()
                      TextField("IP Address", text: $ipAddress)
                          .textFieldStyle(RoundedBorderTextFieldStyle())
                          .padding(.horizontal).keyboardType(.numbersAndPunctuation)
                      Button(action: {
                          isStreaming ? stopStreaming() : requestMicAndStart()
                      }) {
                          Text(isStreaming ? "Stop Streaming" : "Start Streaming")
                              .font(.title2).foregroundColor(.white)
                              .frame(width: 250, height: 60)
                              .background(isStreaming ? Color.red : Color.green)
                              .cornerRadius(15)
                      }
                  }
              }
              
              func requestMicAndStart() {
                  AVAudioSession.sharedInstance().requestRecordPermission { granted in
                      if granted { DispatchQueue.main.async { self.startStreaming() } }
                  }
              }
              
              func startStreaming() {
                  let host = NWEndpoint.Host(ipAddress)
                  let portNum = NWEndpoint.Port(port) ?? 12345
                  connection = NWConnection(host: host, port: portNum, using: .udp)
                  connection?.start(queue: .global())
                  
                  let audioSession = AVAudioSession.sharedInstance()
                  try? audioSession.setCategory(.record, mode: .measurement, options: [.allowBluetooth])
                  try? audioSession.setPreferredSampleRate(48000)
                  try? audioSession.setActive(true)
                  
                  let inputNode = audioEngine.inputNode
                  let format = AVAudioFormat(commonFormat: .pcmFormatInt16, sampleRate: 48000, channels: 1, interleaved: true)!
                  
                  inputNode.installTap(onBus: 0, bufferSize: 960, format: format) { (buffer, time) in
                      guard let channelData = buffer.int16ChannelData else { return }
                      let frameLength = Int(buffer.frameLength)
                      let data = Data(bytes: channelData[0], count: frameLength * MemoryLayout<Int16>.size)
                      self.connection?.send(content: data, completion: .contentProcessed({ _ in }))
                  }
                  try? audioEngine.start()
                  isStreaming = true
              }
              
              func stopStreaming() {
                  audioEngine.stop()
                  audioEngine.inputNode.removeTap(onBus: 0)
                  connection?.cancel()
                  isStreaming = false
              }
          }
          EOF
          
      - name: Generate Xcode project
        run: xcodegen generate
        
      - name: Build Payload
        run: |
          xcodebuild build -project iAudioApp.xcodeproj -scheme iAudioApp -configuration Release -arch arm64 -sdk iphoneos CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO CONFIGURATION_BUILD_DIR=build/Release-iphoneos
          mkdir -p Payload
          mv build/Release-iphoneos/iAudioApp.app Payload/
          zip -r iAudioApp.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iAudioApp-IPA
          path: iAudioApp.ipa

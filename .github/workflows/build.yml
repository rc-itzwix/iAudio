name: Build IPA
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install xcodegen
        run: brew install xcodegen
        
      - name: Create Project Files
        run: |
          mkdir -p iAudioApp
          
          cat << 'EOF' > project.yml
          name: iAudioApp
          options:
            bundleIdPrefix: com.iaudio
          targets:
            iAudioApp:
              type: application
              platform: iOS
              deploymentTarget: "14.0"
              sources: [iAudioApp]
              info:
                path: iAudioApp/Info.plist
          EOF
          
          cat << 'EOF' > iAudioApp/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>NSMicrophoneUsageDescription</key>
            <string>Передача аудио на ПК</string>
            <key>NSLocalNetworkUsageDescription</key>
            <string>Связь по Wi-Fi</string>
            <key>UIBackgroundModes</key>
            <array>
              <string>audio</string>
            </array>
          </dict>
          </plist>
          EOF
          
          cat << 'EOF' > iAudioApp/iAudioAppApp.swift
          import SwiftUI
          @main
          struct iAudioAppApp: App {
              var body: some Scene {
                  WindowGroup { ContentView() }
              }
          }
          EOF
          
          cat << 'EOF' > iAudioApp/ContentView.swift
          import SwiftUI
          import AVFoundation
          import Network

          class StreamSettings: ObservableObject {
              @AppStorage("ipAddress") var ipAddress: String = "192.168.137.1"
              @AppStorage("port") var port: String = "12345"
              @AppStorage("mode") var mode: String = "USB" 
          }

          class AudioStreamer: ObservableObject {
              @Published var isStreaming = false
              @Published var usbConnected = false
              private var audioEngine = AVAudioEngine()
              private var connection: NWConnection?
              private var listener: NWListener?
              
              func start(settings: StreamSettings) {
                  let tcpOptions = NWProtocolTCP.Options()
                  tcpOptions.noDelay = true
                  let tcpParams = NWParameters(tls: nil, tcp: tcpOptions)
                  
                  if settings.mode == "Wi-Fi" {
                      let host = NWEndpoint.Host(settings.ipAddress)
                      let port = NWEndpoint.Port(settings.port) ?? 12345
                      connection = NWConnection(host: host, port: port, using: .udp)
                      connection?.start(queue: .global(qos: .userInteractive))
                      setupAudio()
                  } else {
                      let port = NWEndpoint.Port(settings.port) ?? 12345
                      do {
                          listener = try NWListener(using: tcpParams, on: port)
                          listener?.newConnectionHandler = { newConn in
                              self.connection = newConn
                              newConn.stateUpdateHandler = { state in
                                  DispatchQueue.main.async { self.usbConnected = (state == .ready) }
                              }
                              newConn.start(queue: .global(qos: .userInteractive))
                          }
                          listener?.start(queue: .global(qos: .userInteractive))
                          setupAudio()
                      } catch { print(error) }
                  }
              }
              
              private func setupAudio() {
                  let session = AVAudioSession.sharedInstance()
                  try? session.setCategory(.playAndRecord, mode: .voiceChat, options: [.allowBluetooth, .allowBluetoothA2DP, .defaultToSpeaker])
                  try? session.setPreferredSampleRate(48000)
                  try? session.setPreferredIOBufferDuration(0.005) 
                  try? session.setActive(true)
                  
                  let inputNode = audioEngine.inputNode
                  let format = AVAudioFormat(commonFormat: .pcmFormatInt16, sampleRate: 48000, channels: 1, interleaved: true)!
                  
                  inputNode.removeTap(onBus: 0)
                  inputNode.installTap(onBus: 0, bufferSize: 480, format: format) { (buffer, time) in
                      guard let channelData = buffer.int16ChannelData else { return }
                      let data = Data(bytes: channelData[0], count: Int(buffer.frameLength) * 2)
                      self.connection?.send(content: data, completion: .contentProcessed({ _ in }))
                  }
                  
                  try? audioEngine.start()
                  DispatchQueue.main.async { self.isStreaming = true }
              }
              
              func stop() {
                  audioEngine.stop()
                  audioEngine.inputNode.removeTap(onBus: 0)
                  connection?.cancel()
                  listener?.cancel()
                  isStreaming = false
              }
          }

          struct ContentView: View {
              @StateObject var streamer = AudioStreamer()
              @StateObject var settings = StreamSettings()
              var body: some View {
                  TabView {
                      VStack(spacing: 30) {
                          Text("iAudio").font(.largeTitle).bold()
                          Button(action: { streamer.isStreaming ? streamer.stop() : streamer.start(settings: settings) }) {
                              Circle().fill(streamer.isStreaming ? (settings.mode == "USB" && !streamer.usbConnected ? .orange : .blue) : .gray)
                                  .frame(width: 150, height: 150)
                                  .overlay(Image(systemName: streamer.isStreaming ? "mic.fill" : "mic.slash.fill").foregroundColor(.white).font(.system(size: 60)))
                          }
                          Text(streamer.isStreaming ? "STREAMING" : "READY").bold()
                      }.tabItem { Label("Mic", systemImage: "mic") }
                      
                      NavigationView {
                          Form {
                              Picker("Mode", selection: $settings.mode) { Text("Wi-Fi").tag("Wi-Fi"); Text("USB").tag("USB") }.pickerStyle(SegmentedPickerStyle())
                              if settings.mode == "Wi-Fi" { TextField("IP", text: $settings.ipAddress) }
                              TextField("Port", text: $settings.port)
                          }.navigationTitle("Settings")
                      }.tabItem { Label("Settings", systemImage: "gear") }
                  }
              }
          }
          EOF
          
      - name: Generate Xcode project
        run: xcodegen generate
        
      - name: Build Payload
        run: |
          xcodebuild build -project iAudioApp.xcodeproj -scheme iAudioApp -configuration Release -arch arm64 -sdk iphoneos CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO CONFIGURATION_BUILD_DIR=build/Release-iphoneos
          mkdir -p Payload
          mv build/Release-iphoneos/iAudioApp.app Payload/
          zip -r iAudioApp.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iAudioApp-IPA
          path: iAudioApp.ipa

name: Build IPA
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install xcodegen
        run: brew install xcodegen
        
      - name: Create Project Files
        run: |
          mkdir -p iAudioApp
          
          cat << 'EOF' > project.yml
          name: iAudioApp
          options:
            bundleIdPrefix: com.iaudio
          targets:
            iAudioApp:
              type: application
              platform: iOS
              deploymentTarget: "16.0"
              sources: [iAudioApp]
              info:
                path: iAudioApp/Info.plist
          EOF
          
          cat << 'EOF' > iAudioApp/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>NSMicrophoneUsageDescription</key>
            <string>Нужен микрофон для передачи аудио</string>
            <key>NSLocalNetworkUsageDescription</key>
            <string>Нужен доступ к сети</string>
            <key>UIBackgroundModes</key>
            <array>
              <string>audio</string>
            </array>
          </dict>
          </plist>
          EOF
          
          cat << 'EOF' > iAudioApp/iAudioAppApp.swift
          import SwiftUI

          @main
          struct iAudioAppApp: App {
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                  }
              }
          }
          EOF
          
          cat << 'EOF' > iAudioApp/ContentView.swift
          import SwiftUI
          import AVFoundation
          import Network

          struct MicInputOption: Hashable {
              let id: String
              let name: String
              let portUID: String
              let dataSourceID: NSNumber?
          }

          class StreamSettings: ObservableObject {
              @AppStorage("connectionMode") var connectionMode: String = "Wi-Fi"
              @AppStorage("ipAddress") var ipAddress: String = "192.168.1.100"
              @AppStorage("port") var port: String = "12345"
              @AppStorage("sampleRate") var sampleRate: Double = 48000.0
              @AppStorage("channels") var channels: Int = 1
              @AppStorage("bitDepth") var bitDepth: String = "Int16"
              @AppStorage("protocolType") var protocolType: String = "UDP"
              @AppStorage("bufferSize") var bufferSize: Int = 1024
              @AppStorage("keepAwake") var keepAwake: Bool = true
              @AppStorage("hapticFeedback") var hapticFeedback: Bool = true
              @AppStorage("selectedMicID") var selectedMicID: String = ""
              @Published var activeMic: MicInputOption? = nil
          }

          class AudioStreamer: ObservableObject {
              @Published var isStreaming = false
              private var audioEngine = AVAudioEngine()
              private var connection: NWConnection?
              private var listener: NWListener?
              
              func start(config: StreamSettings) {
                  let portNum = NWEndpoint.Port(config.port) ?? 12345
                  
                  if config.connectionMode == "Wi-Fi" {
                      let host = NWEndpoint.Host(config.ipAddress)
                      let params: NWParameters = config.protocolType == "TCP" ? .tcp : .udp
                      connection = NWConnection(host: host, port: portNum, using: params)
                      connection?.start(queue: .global())
                  } else {
                      // USB Mode: Слушаем входящее подключение от ПК
                      do {
                          listener = try NWListener(using: .tcp, on: portNum)
                          listener?.newConnectionHandler = { newConn in
                              self.connection = newConn
                              newConn.start(queue: .global())
                          }
                          listener?.start(queue: .global())
                      } catch { print("Listener error") }
                  }
                  
                  UIApplication.shared.isIdleTimerDisabled = config.keepAwake
                  
                  let session = AVAudioSession.sharedInstance()
                  do {
                      try session.setCategory(.playAndRecord, mode: .measurement, options: [.allowBluetooth, .defaultToSpeaker])
                      if let targetMic = config.activeMic, let inputs = session.availableInputs {
                          if let port = inputs.first(where: { $0.uid == targetMic.portUID }) {
                              try session.setPreferredInput(port)
                              if let dsID = targetMic.dataSourceID, let dataSources = port.dataSources {
                                  if let source = dataSources.first(where: { $0.dataSourceID == dsID }) {
                                      try port.setPreferredDataSource(source)
                                  }
                              }
                          }
                      }
                      try session.setPreferredSampleRate(config.sampleRate)
                      try session.setPreferredIOBufferDuration(Double(config.bufferSize) / config.sampleRate)
                      try session.setActive(true)
                  } catch {}
                  
                  let inputNode = audioEngine.inputNode
                  let inputFormat = inputNode.inputFormat(forBus: 0)
                  let outputFormat = AVAudioFormat(
                      commonFormat: config.bitDepth == "Int16" ? .pcmFormatInt16 : .pcmFormatFloat32,
                      sampleRate: session.sampleRate,
                      channels: AVAudioChannelCount(config.channels),
                      interleaved: true
                  )!
                  
                  let converter = AVAudioConverter(from: inputFormat, to: outputFormat)
                  
                  inputNode.installTap(onBus: 0, bufferSize: AVAudioFrameCount(config.bufferSize), format: inputFormat) { buffer, time in
                      let frameCount = AVAudioFrameCount(outputFormat.sampleRate / 100)
                      guard let outBuffer = AVAudioPCMBuffer(pcmFormat: outputFormat, frameCapacity: frameCount) else { return }
                      var error: NSError?
                      converter?.convert(to: outBuffer, error: &error) { inNumPackets, outStatus in
                          outStatus.pointee = AVAudioConverterInputStatus.haveData
                          return buffer
                      }
                      if let data = self.toData(buffer: outBuffer) {
                          self.connection?.send(content: data, completion: .contentProcessed({ _ in }))
                      }
                  }
                  do {
                      try audioEngine.start()
                      isStreaming = true
                      if config.hapticFeedback { UIImpactFeedbackGenerator(style: .heavy).impactOccurred() }
                  } catch {}
              }
              
              func stop() {
                  audioEngine.stop()
                  audioEngine.inputNode.removeTap(onBus: 0)
                  connection?.cancel()
                  listener?.cancel()
                  isStreaming = false
                  UIApplication.shared.isIdleTimerDisabled = false
                  UIImpactFeedbackGenerator(style: .rigid).impactOccurred()
              }
              
              private func toData(buffer: AVAudioPCMBuffer) -> Data? {
                  let frameLength = Int(buffer.frameLength)
                  if buffer.format.commonFormat == .pcmFormatInt16 {
                      guard let channelData = buffer.int16ChannelData else { return nil }
                      return Data(bytes: channelData[0], count: frameLength * MemoryLayout<Int16>.size)
                  } else {
                      guard let channelData = buffer.floatChannelData else { return nil }
                      return Data(bytes: channelData[0], count: frameLength * MemoryLayout<Float>.size)
                  }
              }
          }

          struct WaveView: View {
              @State private var wave = false
              var body: some View {
                  ZStack {
                      ForEach(0..<3) { i in
                          Circle()
                              .fill(Color.blue.opacity(0.2))
                              .frame(width: 140, height: 140)
                              .scaleEffect(wave ? 4.5 : 1.0)
                              .opacity(wave ? 0.0 : 1.0)
                              .animation(
                                  Animation.timingCurve(0.2, 0.8, 0.2, 1, duration: 6.0)
                                      .repeatForever(autoreverses: false)
                                      .delay(Double(i) * 2.0),
                                  value: wave
                              )
                      }
                  }
                  .onAppear { wave = true }
              }
          }

          struct MainView: View {
              @ObservedObject var streamer: AudioStreamer
              @ObservedObject var settings: StreamSettings
              var body: some View {
                  ZStack {
                      Color.black.ignoresSafeArea()
                      VStack {
                          Spacer()
                          ZStack {
                              if streamer.isStreaming { WaveView() }
                              Button(action: { streamer.isStreaming ? streamer.stop() : streamer.start(config: settings) }) {
                                  Image(systemName: streamer.isStreaming ? "mic.fill" : "mic.slash.fill")
                                      .font(.system(size: 130))
                                      .foregroundColor(.white)
                                      .frame(width: 160, height: 160)
                              }
                              .buttonStyle(PlainButtonStyle())
                          }
                          Spacer()
                      }
                  }
              }
          }

          struct SettingsView: View {
              @ObservedObject var settings: StreamSettings
              @State private var availableOptions: [MicInputOption] = []
              @State private var availableRates: [Double] = [16000.0, 32000.0, 44100.0, 48000.0]
              
              var body: some View {
                  NavigationView {
                      Form {
                          Section(header: Text("Подключение")) {
                              Picker("Тип соединения", selection: $settings.connectionMode) {
                                  Text("Wi-Fi (IP)").tag("Wi-Fi")
                                  Text("USB (Кабель)").tag("USB")
                              }
                              .pickerStyle(SegmentedPickerStyle())
                              
                              if settings.connectionMode == "Wi-Fi" {
                                  HStack {
                                      Text("IP-адрес")
                                      Spacer()
                                      TextField("192.168.1.1", text: $settings.ipAddress)
                                          .multilineTextAlignment(.trailing)
                                          .keyboardType(.numbersAndPunctuation)
                                          .foregroundColor(.secondary)
                                  }
                              }
                              
                              HStack {
                                  Text("Порт")
                                  Spacer()
                                  TextField("12345", text: $settings.port)
                                      .multilineTextAlignment(.trailing)
                                      .keyboardType(.numberPad)
                                      .foregroundColor(.secondary)
                              }
                              
                              if settings.connectionMode == "Wi-Fi" {
                                  Picker("Протокол", selection: $settings.protocolType) {
                                      Text("UDP (Быстрый)").tag("UDP")
                                      Text("TCP (Надежный)").tag("TCP")
                                  }
                              }
                          }
                          
                          Section(header: Text("Захват звука")) {
                              Picker("Устройство", selection: $settings.activeMic) {
                                  Text("Автоматически").tag(nil as MicInputOption?)
                                  ForEach(availableOptions, id: \.self) { option in
                                      Text(option.name).tag(option as MicInputOption?)
                                  }
                              }
                          }
                          
                          Section(header: Text("Качество и формат")) {
                              Picker("Частота", selection: $settings.sampleRate) {
                                  ForEach(availableRates, id: \.self) { rate in 
                                      Text("\(String(format: "%.1f", rate/1000)) кГц").tag(rate) 
                                  }
                              }
                              Picker("Каналы", selection: $settings.channels) {
                                  Text("Моно").tag(1)
                                  Text("Стерео").tag(2)
                              }
                              Picker("Разрядность", selection: $settings.bitDepth) {
                                  Text("16 бит").tag("Int16")
                                  Text("32 бита").tag("Float32")
                              }
                          }
                          
                          Section(header: Text("Буфер"), footer: Text("Малый размер буфера снижает задержку, но нагружает сеть.")) {
                              Picker("Размер", selection: $settings.bufferSize) {
                                  Text("512 samples").tag(512)
                                  Text("1024 samples").tag(1024)
                                  Text("2048 samples").tag(2048)
                                  Text("4096 samples").tag(4096)
                              }
                          }
                          
                          Section(header: Text("Система")) {
                              Toggle("Не выключать экран", isOn: $settings.keepAwake)
                              Toggle("Тактильный отклик", isOn: $settings.hapticFeedback)
                              Button("Обновить оборудование") { refreshDevices() }
                          }
                      }
                      .navigationTitle("Настройки")
                      .onAppear { refreshDevices() }
                  }
              }
              
              func refreshDevices() {
                  let session = AVAudioSession.sharedInstance()
                  try? session.setCategory(.playAndRecord, options: [.allowBluetooth])
                  try? session.setActive(true)
                  var options: [MicInputOption] = []
                  if let inputs = session.availableInputs {
                      for input in inputs {
                          if input.portType == .builtInMic, let sources = input.dataSources {
                              for source in sources {
                                  let newOption = MicInputOption(id: "\(input.uid)_\(source.dataSourceID ?? 0)", name: "Микрофон: \(source.dataSourceName)", portUID: input.uid, dataSourceID: source.dataSourceID)
                                  options.append(newOption)
                                  if newOption.id == settings.selectedMicID { settings.activeMic = newOption }
                              }
                          } else {
                              let newOption = MicInputOption(id: input.uid, name: input.portName, portUID: input.uid, dataSourceID: nil)
                              options.append(newOption)
                              if newOption.id == settings.selectedMicID { settings.activeMic = newOption }
                          }
                      }
                  }
                  availableOptions = options
                  let currentRate = session.sampleRate
                  if currentRate > 48000 && !availableRates.contains(currentRate) {
                      availableRates.append(currentRate)
                      availableRates.sort()
                  }
              }
          }

          struct ContentView: View {
              @StateObject var streamer = AudioStreamer()
              @StateObject var settings = StreamSettings()
              var body: some View {
                  TabView {
                      MainView(streamer: streamer, settings: settings)
                          .tabItem { Label("Микрофон", systemImage: "waveform") }
                          .toolbar(.visible, for: .tabBar)
                          .toolbarBackground(Color.black, for: .tabBar)
                          .toolbarColorScheme(.dark, for: .tabBar)
                      SettingsView(settings: settings)
                          .tabItem { Label("Настройки", systemImage: "gear") }
                  }
                  .onAppear { AVAudioSession.sharedInstance().requestRecordPermission { _ in } }
              }
          }
          EOF
          
      - name: Generate Xcode project
        run: xcodegen generate
        
      - name: Build Payload
        run: |
          xcodebuild build -project iAudioApp.xcodeproj -scheme iAudioApp -configuration Release -arch arm64 -sdk iphoneos CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO CONFIGURATION_BUILD_DIR=build/Release-iphoneos
          mkdir -p Payload
          mv build/Release-iphoneos/iAudioApp.app Payload/
          zip -r iAudioApp.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iAudioApp-IPA
          path: iAudioApp.ipa
